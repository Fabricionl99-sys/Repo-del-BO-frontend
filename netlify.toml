[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_USE_MOCKS = "true"
  VITE_API_BASE_URL = "https://api.preview.niveles.io"

[[redirects]]
  from = "/multiplicadores"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/multiplicadores/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
